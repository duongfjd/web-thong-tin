<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chat Moderation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./admin.css">
    <link id="darkThemeStyle" rel="stylesheet" href="./theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Apply theme early
        let savedTheme = localStorage.getItem('theme') || 'dark'; // DEFAULT IS DARK MODE based on user previous state
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            // We need to disable the theme.css dynamically if it's light mode
            // We use DOMContentLoaded because the link tag is below this script
            document.addEventListener("DOMContentLoaded", () => {
                const darkStyle = document.getElementById("darkThemeStyle");
                if(darkStyle) darkStyle.disabled = true;
                
                // Update icon
                const toggleBtn = document.getElementById("themeToggle");
                if(toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
            });
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5865958468639276"
     crossorigin="anonymous"></script>
</head>
<body>
    <header class="header navbar navbar-expand-lg" id="header">
        <div class="container">
            <div class="nav-brand">
                <a href="./index.html" style="text-decoration: none; color: inherit;">
                    <h2>Portfolio</h2>
                </a>
            </div>
            <nav class="nav-menu collapse navbar-collapse" id="nav-menu">
                <ul class="nav-list navbar-nav mx-auto mb-2 mb-lg-0">
                    <li><a href="./chat.html" class="nav-link">Chat</a></li>
                    <li><a href="./index.html" class="nav-link">Trang chủ</a></li>
                </ul>
            </nav>
            <div class="auth-buttons d-flex align-items-center gap-2">
                <button id="themeToggle" class="btn-theme-toggle" aria-label="Toggle Theme" style="background:transparent; border:none; color: var(--text-primary, #333); font-size:1.2rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <div class="user-dropdown">
                        <a href="#" id="logoutBtn">Đăng xuất</a>
                    </div>
                </div>
                <div id="notAdmin" style="color: #dc2626; font-weight: 600;">Bạn không phải Admin</div>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="container">
            <section class="admin-header">
                <h1><i class="fas fa-shield-alt"></i> Admin Dashboard - Moderation</h1>
                <p>Duyệt báo cáo, xóa tin nhắn, quản lý người dùng</p>
            </section>

            <section class="admin-content">
                <div class="admin-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalReports">0</div>
                        <div class="stat-label">Báo cáo chưa xử lý</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="resolvedCount">0</div>
                        <div class="stat-label">Báo cáo đã xử lý</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="deletedCount">0</div>
                        <div class="stat-label">Tin nhắn đã xóa</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="bannedCount">0</div>
                        <div class="stat-label">Người dùng bị cấm</div>
                    </div>
                </div>

                <div class="admin-filters">
                    <select id="filterStatus" class="filter-select form-select">
                        <option value="">Tất cả báo cáo</option>
                        <option value="pending">Chưa xử lý</option>
                        <option value="resolved">Đã xử lý</option>
                    </select>
                    <select id="filterReason" class="filter-select form-select">
                        <option value="">Tất cả lý do</option>
                        <option value="spam">Spam</option>
                        <option value="hate speech">Hate Speech</option>
                        <option value="NSFW">NSFW</option>
                    </select>
                    <button id="refreshBtn" class="btn btn-primary"><i class="fas fa-sync"></i> Tải lại</button>
                </div>

                <div class="reports-list" id="reportsList"></div>
            </section>
        </div>
    </main>

    <!-- Ban User Modal -->
    <div class="modal" id="banModal">
        <div class="modal-content card shadow-lg">
            <div class="modal-header">
                <h2>Cấm người dùng</h2>
                <span class="close" id="closeBanModal">&times;</span>
            </div>
            <form id="banForm" class="needs-validation" novalidate>
                <div class="form-group">
                    <label>Tên người dùng:</label>
                    <p id="banUserName" style="font-weight: 600;"></p>
                </div>
                <div class="form-group">
                    <label for="banReason">Lý do cấm:</label>
                    <select id="banReason" class="form-select" required>
                        <option value="">-- Chọn lý do --</option>
                        <option value="spam">Spam</option>
                        <option value="harassment">Qu騖 nhiễu</option>
                        <option value="hate_speech">Phát biểu thù hận</option>
                        <option value="other">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="banDuration">Thời gian cấm (giờ):</label>
                    <input type="number" id="banDuration" class="form-control" min="1" max="720" value="24" required>
                </div>
                <button type="submit" class="btn btn-danger">Cấm người dùng</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./admin.js"></script>
</body>
</html>
